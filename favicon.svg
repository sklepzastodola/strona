<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- zielone tło z zaokrąglonymi rogami -->
  <rect width="100" height="100" rx="22" fill="#2d5a27"/>
  
  <!-- łodyga -->
  <line x1="50" y1="85" x2="50" y2="48" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round"/>
  
  <!-- lewy duży liść — jasnozielony, skierowany w lewo-górę -->
  <path d="M50 55 C42 50 20 48 14 28 C14 28 36 20 50 42 Z" fill="#a8d4a4"/>
  
  <!-- prawy mniejszy liść — biały, skierowany w prawo-górę -->  
  <path d="M50 44 C56 38 76 28 82 10 C82 10 60 8 50 30 Z" fill="rgba(255,255,255,0.88)"/>
</svg>
